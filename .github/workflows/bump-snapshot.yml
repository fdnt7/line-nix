name: Build LINE snapshot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: build-snapshot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Prefetch LINE installer stub
        id: stub
        run: |
          set -euo pipefail
          out=$(nix-prefetch-url --print-path --type sha256 \
                 https://desktop.line-scdn.net/win/new/LineInst.exe)
          installer=$(printf '%s\n' "$out" | tail -n1)
          echo "installer=$installer" >> "$GITHUB_OUTPUT"
          echo "Stub at $installer"

      - name: Install LINE (xvfb + xdotool click-through)
        env:
          INSTALLER: ${{ steps.stub.outputs.installer }}
        run: |
          set -euo pipefail
          mkdir -p wp shots
          export WINEPREFIX="$PWD/wp"
          # Do not set WINEARCH — let pkgs.wine pick its native default.
          export WINEDLLOVERRIDES="mscoree,mshtml="
          export WINEDEBUG=-all

          # LineInst.exe is a custom installer (not NSIS) with a
          # single modal screen: a checkbox ("I agree to the LY
          # Corporation Common Terms of Use") and a green Install
          # button. /S does not bypass it; the default focus is on
          # the checkbox, so sending Return just toggles it. We
          # therefore mouse-click both elements at their observed
          # positions within the wine window. Screenshots are
          # captured around each click for diagnosis.
          #
          # After Install is clicked, LINE auto-launches. We use
          # `wineserver -k` (not pkill -f, which would match our own
          # script's cmdline) for a clean shutdown.
          nix shell \
              nixpkgs#wine \
              nixpkgs#xvfb-run \
              nixpkgs#xdotool \
              nixpkgs#findutils \
              nixpkgs#imagemagick \
            --command xvfb-run -a -s "-screen 0 1280x1024x24" \
              bash -euxo pipefail -c '
                wineboot --init
                wine "$INSTALLER" &

                # Wait for the installer window.
                for i in $(seq 1 30); do
                  if xdotool search --name "LINE" >/dev/null 2>&1; then
                    echo "installer window present after ${i}s"
                    break
                  fi
                  sleep 1
                done
                sleep 3
                import -window root shots/00-window-up.png 2>/dev/null || true

                wid=$(xdotool search --name "LINE" | head -1)
                xdotool windowactivate --sync "$wid" 2>/dev/null || true
                eval "$(xdotool getwindowgeometry --shell "$wid")"
                echo "window geometry: X=$X Y=$Y W=$WIDTH H=$HEIGHT"

                # Checkbox at ~8% from left, ~89% from top of the
                # modal. Install button centre at ~84% / ~87%.
                cb_x=$((X + WIDTH * 8 / 100))
                cb_y=$((Y + HEIGHT * 89 / 100))
                btn_x=$((X + WIDTH * 84 / 100))
                btn_y=$((Y + HEIGHT * 87 / 100))

                xdotool mousemove --sync "$cb_x" "$cb_y"
                xdotool click 1
                sleep 1
                import -window root shots/01-after-checkbox.png 2>/dev/null || true

                xdotool mousemove --sync "$btn_x" "$btn_y"
                xdotool click 1
                sleep 2
                import -window root shots/02-after-install.png 2>/dev/null || true

                # Poll for LineLauncher.exe with a generous timeout
                # to cover CDN download speed variability.
                for i in $(seq 1 180); do
                  if find wp/drive_c -ipath "*/LINE/bin/LineLauncher.exe" \
                       -type f 2>/dev/null | grep -q .; then
                    echo "LineLauncher.exe present after install click + ${i}s"
                    break
                  fi
                  if [ $((i % 15)) -eq 0 ]; then
                    import -window root "shots/wait-$(printf %03d "$i").png" \
                      2>/dev/null || true
                  fi
                  sleep 1
                done

                import -window root shots/03-final.png 2>/dev/null || true
                wineserver -k || true
              '

          if ! find wp/drive_c -ipath '*/LINE/bin/LineLauncher.exe' \
               -type f 2>/dev/null | grep -q .; then
            echo "::error::LineLauncher.exe never appeared — install failed"
            find wp/drive_c -maxdepth 6 -type d -name LINE || true
            exit 1
          fi
          echo "Install OK"

      - name: Upload install screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: install-screenshots
          path: shots/
          if-no-files-found: ignore

      - name: Scrub prefix for determinism
        run: |
          set -euo pipefail

          # Registry: zero both per-key `#time=<hex>` lines and the
          # per-section unix timestamps that follow the section header
          # (`[Path\\To\\Key] 1779869605`). The latter dominates the
          # diff between two clean installs of the same upstream.
          for f in wp/system.reg wp/user.reg wp/userdef.reg; do
            [ -f "$f" ] || continue
            sed -i 's/^#time=.*$/#time=0/' "$f"
            sed -i -E 's/^(\[[^]]*\]) [0-9]+$/\1 0/' "$f"
          done

          # Wine-created host-integration files. The launcher exec's
          # LineLauncher.exe directly so none of these are used. They
          # carry random GUIDs / per-host paths.
          rm -rf "wp/drive_c/users/runner/AppData/Roaming/Microsoft/Windows/Start Menu/LINE.lnk" \
                 "wp/drive_c/users/runner/AppData/Roaming/Microsoft/Windows/Start Menu/Programs/LINE" \
                 "wp/drive_c/users/runner/Desktop" \
                 2>/dev/null || true

          # NSIS leftover temp files (LineInst_<pid>.exe, ns<rand>.tmp,
          # etc.) and other ephemeral dirs.
          rm -rf wp/drive_c/users/runner/Temp \
                 wp/drive_c/users/runner/AppData/Local/Temp \
                 wp/drive_c/windows/Temp \
                 wp/.update-timestamp 2>/dev/null || true

          # dosdevices: the host runner enumerates a variable set of
          # com*/lpt* symlinks. Keep only the stable two wine cares
          # about for our use case: c: and z:.
          if [ -d wp/dosdevices ]; then
            find wp/dosdevices -mindepth 1 -maxdepth 1 \
              ! -name 'c:' ! -name 'z:' -exec rm -rf {} +
          fi

      - name: Build deterministic tarball
        id: snap
        run: |
          set -euo pipefail
          # Defensive: normalise the user dir to `runner` even though CI
          # already runs as runner — keeps the snapshot launcher's
          # SNAPSHOT_USER=runner invariant true regardless of where the
          # snapshot was built.
          tar --sort=name --owner=0 --group=0 --numeric-owner --mtime='@0' \
              --transform "s|drive_c/users/$(whoami)|drive_c/users/runner|g" \
              --use-compress-program='zstd -19 --threads=0' \
              -cf line-snapshot.tar.zst \
              -C wp .
          ls -lh line-snapshot.tar.zst
          hash=$(nix hash file --type sha256 --sri line-snapshot.tar.zst)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Compare to current pin
        id: cmp
        run: |
          set -euo pipefail
          current=$(jq -r '.hash // "null"' nix/snapshot-pin.json)
          new='${{ steps.snap.outputs.hash }}'
          if [ "$current" = "$new" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no change"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "changed: $current -> $new"
          fi

      - name: Create GitHub release
        if: steps.cmp.outputs.changed == 'true'
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          SNAP_HASH: ${{ steps.snap.outputs.hash }}
        run: |
          set -euo pipefail
          tag="snapshot-$(date -u +%Y%m%d-%H%M%S)"
          gh release create "$tag" line-snapshot.tar.zst \
            --title "LINE snapshot $tag" \
            --notes "Automated snapshot built with plain pkgs.wine, silent install, no winetricks.

          Hash: \`$SNAP_HASH\`"
          url="${{ github.server_url }}/${{ github.repository }}/releases/download/$tag/line-snapshot.tar.zst"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Update pin
        if: steps.cmp.outputs.changed == 'true'
        env:
          URL: ${{ steps.release.outputs.url }}
          HASH: ${{ steps.snap.outputs.hash }}
        run: |
          set -euo pipefail
          jq -n \
            --arg url        "$URL" \
            --arg hash       "$HASH" \
            --arg capturedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              url: $url,
              hash: $hash,
              capturedAt: $capturedAt
            }' > nix/snapshot-pin.json

      - name: Open PR
        if: steps.cmp.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump LINE snapshot to ${{ steps.release.outputs.tag }}"
          title: "chore: bump LINE snapshot (${{ steps.release.outputs.tag }})"
          body: |
            Automated snapshot bump (plain pkgs.wine, no winetricks).

            - **Hash:** `${{ steps.snap.outputs.hash }}`
            - **Release:** ${{ steps.release.outputs.url }}
          # Limit the auto-bump commit to the pin file. Without this,
          # create-pull-request stages every dirty path in the working
          # tree (wine prefix + screenshots + tarball).
          add-paths: nix/snapshot-pin.json
          branch: auto/snapshot-bump
          delete-branch: true
          labels: automated
